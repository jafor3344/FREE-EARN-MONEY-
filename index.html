<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AdCash Pro - Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary: #007AFF; --bg: #F2F4F7; --card: #FFFFFF; --text: #1C1C1E; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: var(--text); }
        
        /* Profile Header */
        .profile-header { display: flex; align-items: center; gap: 15px; padding: 20px; background: var(--card); margin-bottom: 1px; border-radius: 0 0 20px 20px; }
        .user-pic { width: 50px; height: 50px; border-radius: 50%; background: #ddd; object-fit: cover; border: 2px solid var(--primary); display: block; }
        .user-info-text { display: flex; flex-direction: column; }
        .user-name { font-weight: 800; font-size: 18px; color: var(--text); }
        .user-status { font-size: 12px; color: #4CAF50; font-weight: bold; }

        /* Balance Area */
        .header-balance { background: var(--primary); color: white; padding: 25px 20px; border-radius: 20px; text-align: center; margin: 15px; }
        .balance-val { font-size: 38px; font-weight: 800; margin: 5px 0; }
        
        .container { padding: 0 15px; }
        .card { background: var(--card); padding: 18px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* Wallet Grid */
        .method-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .method-card { background: #fff; border: 1.5px solid #eee; border-radius: 15px; padding: 15px 5px; text-align: center; cursor: pointer; transition: 0.3s; }
        .method-card.active { border-color: var(--primary); background: #f0f7ff; }
        .method-card img { width: 40px; height: 40px; margin-bottom: 8px; object-fit: contain; }
        .method-card span { display: block; font-size: 11px; font-weight: 600; color: #444; }

        /* List Items */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #fff; border-radius: 15px; margin-bottom: 10px; border: 1px solid #eee; }
        .list-left { display: flex; align-items: center; gap: 12px; }
        .list-left img { width: 30px; height: 30px; border-radius: 50%; }
        .status-badge { background: #E8F5E9; color: #2E7D32; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }

        .withdraw-input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 15px; font-size: 16px; font-weight: 700; cursor: pointer; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { color: #8E8E93; text-decoration: none; font-size: 11px; text-align: center; flex: 1; border: none; background: none; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="section-home">
    <div class="profile-header">
        <img id="u-pic" class="user-pic" src="" alt="User">
        <div class="user-info-text">
            <span class="user-name" id="u-name">Loading...</span>
            <span class="user-status">● Active Member</span>
        </div>
    </div>
    <div class="header-balance">
        <div style="font-size: 13px; opacity: 0.9;">Main Balance</div>
        <div class="balance-val" id="bal">$0.000</div>
    </div>
    <div class="container">
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-chart-line"></i> Income Status</div>
            <div style="height: 180px; width: 100%;"><canvas id="incomeChart"></canvas></div>
        </div>
        <button class="btn-main" onclick="showSection('task')">START EARNING</button>
        <button id="admin-btn" class="btn-main" style="display:none; margin-top:10px; background:#333;" onclick="showSection('admin')">ADMIN PANEL</button>
    </div>
</div>

<div id="section-task" style="display:none;" class="container">
    <br>
    <div class="card">
        <div class="card-title">Tasks</div>
        <button class="btn-main" onclick="watchAd()">Watch Video Ad ($0.003)</button>
    </div>
</div>

<div id="section-wallet" style="display:none;" class="container">
    <br>
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-wallet"></i> Cash Out</div>
        <p style="font-size: 12px; color: #666; margin-bottom: 15px;">Minimum withdrawal is $10.00</p>
        <div class="method-grid">
            <div class="method-card" onclick="selectMethod('bKash', 'Enter bKash Number', this)">
                <img src="https://raw.githubusercontent.com/Shikkha-Project/logos/main/bkash.png">
                <span>bKash</span>
            </div>
            <div class="method-card" onclick="selectMethod('Nagad', 'Enter Nagad Number', this)">
                <img src="https://raw.githubusercontent.com/Shikkha-Project/logos/main/nagad.png">
                <span>Nagad</span>
            </div>
            <div class="method-card" onclick="selectMethod('Binance', 'Enter UID', this)">
                <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png">
                <span>Binance</span>
            </div>
            <div class="method-card" onclick="selectMethod('USDT', 'Enter Address', this)">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png">
                <span>USDT</span>
            </div>
            <div class="method-card" onclick="selectMethod('Litecoin', 'Enter Address', this)">
                <img src="https://cryptologos.cc/logos/litecoin-ltc-logo.png">
                <span>Litecoin</span>
            </div>
            <div class="method-card" onclick="selectMethod('WebMoney', 'Enter Purse', this)">
                <img src="https://www.webmoney.ru/img/icons/wm_logo_80.png">
                <span>WebMoney</span>
            </div>
        </div>
        <div id="withdraw-controls" style="display:none; margin-top: 15px;">
            <input type="text" id="wallet-addr" class="withdraw-input" placeholder="Address">
            <input type="number" id="amount" class="withdraw-input" placeholder="Amount">
            <button class="btn-main" onclick="handleWithdraw()">Withdraw Now</button>
        </div>
    </div>
    <div class="card">
        <div class="card-title">History</div>
        <div id="history-list"></div>
    </div>
</div>

<div id="section-refer" style="display:none;" class="container">
    <br>
    <div class="card" style="text-align: center;">
        <div class="card-title">Refer Program</div>
        <div id="ref-count-display" style="font-size: 38px; font-weight: bold; color: var(--primary);">0</div>
        <p>Bonus $0.30 per refer</p>
        <button class="btn-main" onclick="copyRef()">Copy link</button>
    </div>
    <div class="card">
        <div class="card-title">Referral List</div>
        <div id="refer-list-data"></div>
    </div>
</div>

<div id="section-admin" style="display:none;" class="container">
    <br>
    <div class="card">
        <div class="card-title">Admin Dashboard</div>
        <input type="text" id="adm-uid" class="withdraw-input" placeholder="User ID">
        <input type="number" id="adm-amt" class="withdraw-input" placeholder="Amount">
        <button class="btn-main" onclick="adminAddBalance()">Add Balance</button>
        <div id="admin-user-list" style="margin-top:20px; font-size:12px;"></div>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="showSection('home', this)"><i class="fa-solid fa-house"></i>Home</button>
    <button class="nav-item" onclick="showSection('task', this)"><i class="fa-solid fa-list-check"></i>Task</button>
    <button class="nav-item" onclick="showSection('refer', this)"><i class="fa-solid fa-users"></i>Refer</button>
    <button class="nav-item" onclick="showSection('wallet', this)"><i class="fa-solid fa-wallet"></i>Wallet</button>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCVhbUfVVx04SpVSSioBp6vw8oOwm3voug",
        authDomain: "telegram-mini-app-64ec3.firebaseapp.com",
        databaseURL: "https://telegram-mini-app-64ec3-default-rtdb.firebaseio.com",
        projectId: "telegram-mini-app-64ec3",
        storageBucket: "telegram-mini-app-64ec3.firebasestorage.app",
        messagingSenderId: "925430758099",
        appId: "1:925430758099:web:773f1e100da1f80a12b226"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    const user = tg.initDataUnsafe?.user;
    const uid = user?.id || "Dev_User";
    const startParam = tg.initDataUnsafe?.start_param;
    const adminId = 6717490662;

    let state = { totalEarning: 0, referrals: 0, weekly: [0,0,0,0,0,0,0], referList: [] };
    let incomeChart = null;
    let selectedMethod = '';

    function init() {
        const name = user ? (user.first_name + (user.last_name ? ' ' + user.last_name : '')) : "User";
        document.getElementById('u-name').innerText = name;
        document.getElementById('u-pic').src = user?.photo_url || `https://ui-avatars.com/api/?name=${name}&background=007AFF&color=fff`;

        if(uid == adminId) {
            document.getElementById('admin-btn').style.display = 'block';
            loadAdminData();
        }

        db.ref('users/' + uid).on('value', (snap) => {
            if (!snap.exists()) {
                let initial = { totalEarning: 0, referrals: 0, weekly: [0,0,0,0,0,0,0], name: name, referList: [] };
                if (startParam && startParam != uid) {
                    db.ref('users/' + startParam).transaction(u => {
                        if (u) {
                            u.totalEarning = (parseFloat(u.totalEarning) || 0) + 0.30;
                            u.referrals = (parseInt(u.referrals) || 0) + 1;
                            if(!u.referList) u.referList = [];
                            u.referList.push({ name: name, id: uid });
                        }
                        return u;
                    });
                }
                db.ref('users/' + uid).set(initial);
            } else {
                state = snap.val();
                document.getElementById('bal').innerText = `$${(state.totalEarning || 0).toFixed(3)}`;
                document.getElementById('ref-count-display').innerText = state.referrals || 0;
                renderReferList(state.referList);
                renderChart();
                loadHistory();
            }
        });
    }

    function watchAd() {
        db.ref('users/' + uid + '/totalEarning').transaction(c => (c || 0) + 0.003);
        tg.showAlert("Earned $0.003");
    }

    function selectMethod(m, p, el) {
        selectedMethod = m;
        document.getElementById('withdraw-controls').style.display = 'block';
        document.getElementById('wallet-addr').placeholder = p;
        document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    function handleWithdraw() {
        const amt = parseFloat(document.getElementById('amount').value);
        const addr = document.getElementById('wallet-addr').value;
        if(amt < 10) return tg.showAlert("Min $10!");
        db.ref('users/' + uid + '/totalEarning').transaction(c => c - amt);
        db.ref('users/' + uid + '/history').push({
            method: selectedMethod, amount: amt, wallet: addr, status: 'Success', time: new Date().toLocaleString()
        });
        tg.showAlert("Withdraw Success!");
    }

    function renderReferList(list) {
        const div = document.getElementById('refer-list-data');
        if(!list) return;
        div.innerHTML = '';
        list.forEach(r => {
            div.innerHTML += `<div class="list-item">
                <div class="list-left">
                    <img src="https://ui-avatars.com/api/?name=${r.name}">
                    <div><b>${r.name}</b><br><small>ID: ${r.id}</small></div>
                </div>
                <span class="status-badge">Joined</span>
            </div>`;
        });
    }

    function loadHistory() {
        db.ref('users/' + uid + '/history').on('value', (snap) => {
            const div = document.getElementById('history-list');
            div.innerHTML = '';
            snap.forEach(c => {
                const h = c.val();
                div.innerHTML += `<div class="list-item">
                    <div><b>${h.method}</b><br><small>${h.time}</small></div>
                    <div style="text-align:right;"><b>$${h.amount}</b><br><span class="status-badge">Success</span></div>
                </div>`;
            });
        });
    }

    function renderChart() {
        const ctx = document.getElementById('incomeChart').getContext('2d');
        if(incomeChart) incomeChart.destroy();
        incomeChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['S','M','T','W','T','F','S'],
                datasets: [{ data: state.weekly || [0,0,0,0,0,0,0], backgroundColor: '#007AFF' }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }

    function showSection(id, el) {
        ['home','task','refer','wallet','admin'].forEach(s => document.getElementById('section-' + s).style.display = 'none');
        document.getElementById('section-' + id).style.display = 'block';
        if(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    }

    function copyRef() {
        const link = `https://t.me/trustedincome26bot?start=${uid}`;
        navigator.clipboard.writeText(link).then(() => tg.showAlert("Copied!"));
    }

    function adminAddBalance() {
        const target = document.getElementById('adm-uid').value;
        const val = parseFloat(document.getElementById('adm-amt').value);
        db.ref('users/' + target + '/totalEarning').transaction(c => (c || 0) + val);
        tg.showAlert("Added!");
    }

    function loadAdminData() {
        db.ref('users').on('value', snap => {
            const div = document.getElementById('admin-user-list');
            div.innerHTML = '<b>User List:</b><br>';
            snap.forEach(u => div.innerHTML += `ID: ${u.key} | $${(u.val().totalEarning || 0).toFixed(2)}<br>`);
        });
    }

    tg.ready();
    tg.expand();
    window.onload = init;
</script>
</body>
</html>
