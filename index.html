<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AdCash Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* UI Styles */
        :root { --primary-color: #007AFF; --card-bg: #FFFFFF; }
        body { font-family: sans-serif; background: #F0F2F5; margin: 0; padding-bottom: 80px; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .balance-card { background: linear-gradient(135deg, #007AFF, #0056B3); color: white; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .stats-box { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-action { background: var(--primary-color); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { border: none; background: none; color: #888; font-size: 11px; display: flex; flex-direction: column; align-items: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="balance-card">
        <small>Total Balance</small>
        <h1 id="totalEarning">$0.000</h1>
    </div>

    <div class="stats-box">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <b>Income Stats (7D)</b>
            <i class="fa-solid fa-chart-simple" style="color:var(--primary-color)"></i>
        </div>
        <canvas id="incomeChart" style="max-height: 180px;"></canvas>
    </div>

    <button class="btn-action" onclick="watchAd()"><i class="fa-solid fa-play"></i> Watch Ad</button>
</div>

<nav class="nav-bar">
    <button class="nav-item" onclick="openWithdraw()"><i class="fa-solid fa-wallet"></i>Withdraw</button>
    <button class="nav-item" onclick="alert('History system loading...')"><i class="fa-solid fa-history"></i>History</button>
    <button class="nav-item" onclick="copyRef()"><i class="fa-solid fa-user-plus"></i>Invite</button>
    <button class="nav-item" onclick="tg.openTelegramLink('https://t.me/trustedbdincome1')"><i class="fa-solid fa-headset"></i>Support</button>
    <button class="nav-item" onclick="showBonusModal()"><i class="fa-solid fa-gift"></i>Bonus</button>
</nav>

<div id="bonusModal" class="modal">
    <div class="modal-content">
        <h3>Daily Bonus Tasks</h3>
        <button class="btn-action" style="background:#28a745" onclick="claimBonus('c')">Join Channel ($0.03)</button>
        <button class="btn-action" style="background:#17a2b8" onclick="claimBonus('g')">Join Group ($0.02)</button>
        <button onclick="closeModal('bonusModal')" style="width:100%; border:none; background:none; color:red; margin-top:10px">Close</button>
    </div>
</div>

<script>
    // Firebase & Bot Config
    const config = {
        token: '8672799678:AAHcyb7TVwRWKEWi-Ej2nm11Z5zg-NJDkJw',
        admin: '6717490662',
        fb: { databaseURL: "https://fir-90b18-default-rtdb.firebaseio.com" }
    };

    firebase.initializeApp(config.fb);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id || "Local_User";

    let state = { totalEarning: 0, weekly: [0,0,0,0,0,0,0], lastBonus: "" };

    function init() {
        db.ref('users/' + uid).on('value', (snap) => {
            if(snap.exists()) {
                state = snap.val();
                if(!state.weekly) state.weekly = [0,0,0,0,0,0,0];
                renderUI();
            } else {
                db.ref('users/' + uid).set(state);
            }
        });
    }

    function renderUI() {
        document.getElementById('totalEarning').innerText = `$${state.totalEarning.toFixed(3)}`;
        renderChart();
    }

    // Fixed Ad Logic
    async function watchAd() {
        // Monetag ফাংশন চেক করা হচ্ছে
        if (typeof show_10904278 === 'function') {
            try {
                await show_10904278();
                addReward(0.003);
            } catch (e) {
                alert("Ad load failed. Try again.");
            }
        } else {
            // যদি স্ক্রিপ্ট লোড না হয়, সরাসরি রিওয়ার্ড (টেস্টিং এর জন্য)
            addReward(0.003);
            alert("Success! $0.003 added to balance.");
        }
    }

    function addReward(amt) {
        state.totalEarning += amt;
        const day = new Date().getDay();
        state.weekly[day] += amt;
        db.ref('users/' + uid).update(state);
    }

    // Chart Logic
    let myChart;
    function renderChart() {
        const ctx = document.getElementById('incomeChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
                datasets: [{
                    data: state.weekly,
                    backgroundColor: '#5E5CE6',
                    borderRadius: 5
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }

    // Referral & Bonus System
    function copyRef() {
        const link = `https://t.me/trustedincome26bot?start=${uid}`;
        navigator.clipboard.writeText(link);
        alert("Referral link copied!");
    }

    function claimBonus(type) {
        const link = (type === 'c') ? 'https://t.me/trustedbdincome1' : 'https://t.me/trustedbdincome1';
        tg.openTelegramLink(link);
        addReward(type === 'c' ? 0.03 : 0.02);
        closeModal('bonusModal');
    }

    function showBonusModal() { document.getElementById('bonusModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function openWithdraw() { alert("Minimum withdrawal $0.50"); }

    window.onload = init;
</script>

<script src="https://alwingulla.com/88/tag.min.js" data-zone="10904278" async data-cfasync="false"></script>
</body>
</html>
