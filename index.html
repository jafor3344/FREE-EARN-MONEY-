<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AdCash Pro</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --primary: #007AFF; --bg: #F8F9FA; --card: #FFFFFF; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }
        .balance-card { background: linear-gradient(135deg, #007AFF, #0056B3); color: white; margin: 15px; padding: 30px; border-radius: 20px; text-align: center; }
        .balance-amount { font-size: 40px; font-weight: bold; }
        
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; }
        .stat-box { background: white; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #eee; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; width: calc(100% - 30px); margin: 10px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
        .nav-item { border: none; background: none; text-align: center; color: #666; font-size: 12px; }
        .nav-item i { font-size: 20px; display: block; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; padding: 20px; border-radius: 15px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="balance-card">
        <small>Total Balance</small>
        <div class="balance-amount" id="bal">$0.000</div>
    </div>

    <div class="stats-container">
        <div class="stat-box"><span id="t-ads">0</span><br><small>Total Ads</small></div>
        <div class="stat-box"><span id="d-ads">0/50</span><br><small>Today</small></div>
        <div class="stat-box"><span id="refs">0</span><br><small>Referrals</small></div>
    </div>

    <button class="btn-main" onclick="watchAd()"><i class="fa-solid fa-play"></i> Watch Ad</button>

    <div class="bottom-nav">
        <button class="nav-item" onclick="openModal('withdrawModal')"><i class="fa-solid fa-wallet"></i>Withdraw</button>
        <button class="nav-item" onclick="openModal('historyModal')"><i class="fa-solid fa-history"></i>History</button>
        <button class="nav-item" onclick="copyRef()"><i class="fa-solid fa-user-plus"></i>Invite</button>
        <button class="nav-item" onclick="openModal('bonusModal')"><i class="fa-solid fa-gift"></i>Bonus</button>
        <button class="nav-item" onclick="tg.openTelegramLink('https://t.me/+Yzmy6WpJSWVmOWI1')"><i class="fa-solid fa-headset"></i>Support</button>
    </div>

    <div id="bonusModal" class="modal">
        <div class="modal-content">
            <h3>Daily Bonus Tasks</h3>
            <p>প্রতিদিন একবার করে বোনাস নিতে পারবেন</p>
            <div style="border: 1px solid #eee; padding: 10px; margin-bottom: 10px; border-radius: 10px;">
                <p>Join Channel ($0.03)</p>
                <button onclick="doTask('https://t.me/trustedbdincome1', 'c')" style="background:#2481cc; color:white; border:none; padding:5px 10px; border-radius:5px;">Join</button>
                <button onclick="checkTask('c')" style="background:green; color:white; border:none; padding:5px 10px; border-radius:5px;">Check</button>
            </div>
            <div style="border: 1px solid #eee; padding: 10px; margin-bottom: 10px; border-radius: 10px;">
                <p>Join Group ($0.02)</p>
                <button onclick="doTask('https://t.me/+Yzmy6WpJSWVmOWI1', 'g')" style="background:#2481cc; color:white; border:none; padding:5px 10px; border-radius:5px;">Join</button>
                <button onclick="checkTask('g')" style="background:green; color:white; border:none; padding:5px 10px; border-radius:5px;">Check</button>
            </div>
            <button onclick="closeModal('bonusModal')" style="color:red; border:none; background:none;">Close</button>
        </div>
    </div>

    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <h3>Withdraw</h3>
            <p>Minimum $0.50</p>
            <input type="text" id="w-addr" placeholder="Wallet Number">
            <input type="number" id="w-amt" placeholder="Amount (min 0.50)">
            <button class="btn-main" style="width:100%; margin:10px 0;" onclick="withdraw()">Submit</button>
            <button onclick="closeModal('withdrawModal')" style="color:red; border:none; background:none;">Cancel</button>
        </div>
    </div>

    <script>
        const config = {
            mId: '10904278',
            admin: '6717490662',
            token: '8672799678:AAHcyb7TVwRWKEWi-Ej2nm11Z5zg-NJDkJw',
            fb: { databaseURL: "https://fir-90b18-default-rtdb.firebaseio.com" }
        };

        firebase.initializeApp(config.fb);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const uid = tg.initDataUnsafe?.user?.id || "Demo";

        let data = { bal: 0, tAds: 0, dAds: 0, refs: 0, lastBonus: "" };

        function load() {
            db.ref('users/' + uid).on('value', (s) => {
                if(s.exists()) { data = s.val(); updateUI(); }
                else { db.ref('users/' + uid).set(data); }
            });
        }

        function updateUI() {
            document.getElementById('bal').innerText = `$${data.bal.toFixed(3)}`;
            document.getElementById('t-ads').innerText = data.tAds;
            document.getElementById('d-ads').innerText = `${data.dAds}/50`;
            document.getElementById('refs').innerText = data.refs || 0;
        }

        // Ad Logic - Monetag Fix
        function watchAd() {
            if(data.dAds >= 50) return alert("আজকের লিমিট শেষ!");
            if (typeof show_8820427 === 'function') { // মনিট্যাগ ফাংশন নাম চেক করুন
                show_8820427().then(() => reward(0.003));
            } else {
                reward(0.003); // যদি স্ক্রিপ্ট লোড না হয়
                alert("Ad Success! $0.003 added.");
            }
        }

        function reward(a) {
            data.bal += a; data.tAds += 1; data.dAds += 1;
            db.ref('users/' + uid).update(data);
        }

        // Bonus Tasks
        let taskClick = { c: false, g: false };
        function doTask(l, t) { tg.openTelegramLink(l); taskClick[t] = true; }

        function checkTask(t) {
            const today = new Date().toLocaleDateString();
            if(data.lastBonus === today) return alert("আপনি আজ একবার বোনাস নিয়েছেন!");
            if(!taskClick[t]) return alert("আগে জয়েন বাটনে ক্লিক করুন!");

            const amt = (t === 'c') ? 0.03 : 0.02;
            data.bal += amt;
            data.lastBonus = today;
            db.ref('users/' + uid).update(data);
            alert(`সফল! $${amt} যোগ হয়েছে।`);
            closeModal('bonusModal');
        }

        // Withdraw
        function withdraw() {
            const a = parseFloat(document.getElementById('w-amt').value);
            const ad = document.getElementById('w-addr').value;
            if(a < 0.50) return alert("সর্বনিম্ন $0.50 প্রয়োজন!");
            if(a > data.bal) return alert("পর্যাপ্ত ব্যালেন্স নেই!");

            data.bal -= a;
            db.ref('users/' + uid).update(data);
            alert("পেমেন্ট উইথড্র রিকোয়েস্ট সাকসেস!");
            
            const msg = `💰 Withdraw: ${uid}\nAmount: $${a}\nAddress: ${ad}`;
            fetch(`https://api.telegram.org/bot${config.token}/sendMessage?chat_id=${config.admin}&text=${encodeURIComponent(msg)}`);
            closeModal('withdrawModal');
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function copyRef() { 
            navigator.clipboard.writeText(`https://t.me/trustedincome26bot?start=${uid}`);
            alert("Referral Link Copied!"); 
        }

        window.onload = load;
    </script>
    <script src="https://alwingulla.com/88/tag.min.js" data-zone="10904278" async data-cfasync="false"></script>
</body>
</html>
