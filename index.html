<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Taka Income Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary-color: #007AFF; --bg-color: #F0F2F5; --card-bg: #FFFFFF; --text-color: #1D1D1F; }
        [data-theme="dark"] { --bg-color: #000000; --card-bg: #1C1C1E; --text-color: #F5F5F7; }
        body { font-family: sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding-bottom: 80px; }
        .container { padding: 15px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .balance-card { background: linear-gradient(135deg, #007AFF, #0056B3); color: white; text-align: center; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; font-size: 12px; color: #666; text-decoration: none; }
        .nav-item i { font-size: 20px; display: block; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary-color); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container" id="home-section">
    <div class="card balance-card">
        <h3>Current Balance</h3>
        <h1 id="balance-display">$0.000</h1>
    </div>
    
    <div class="card">
        <h3>7 Days Income Status</h3>
        <canvas id="incomeChart" height="150"></canvas>
    </div>
</div>

<div class="container" id="task-section" style="display:none;">
    <div class="card">
        <h3>Daily Tasks</h3>
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span>Join Telegram Channel</span>
            <button class="btn" style="width:auto; margin:0;" onclick="completeTask('channel', 0.03, 'https://t.me/your_channel')">Check ($0.03)</button>
        </div>
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <span>Join Telegram Group</span>
            <button class="btn" style="width:auto; margin:0;" onclick="completeTask('group', 0.02, 'https://t.me/your_group')">Check ($0.02)</button>
        </div>
    </div>
</div>

<div class="container" id="wallet-section" style="display:none;">
    <div class="card">
        <h3>Withdraw Funds</h3>
        <select id="withdraw-method">
            <option value="Binance">Binance</option>
            <option value="bKash">bKash</option>
            <option value="Nagad">Nagad</option>
        </select>
        <input type="text" id="wallet-address" placeholder="Enter Number / UID">
        <input type="number" id="withdraw-amount" placeholder="Amount (Min $0.50)">
        <button class="btn" onclick="processWithdraw()">Withdraw</button>
    </div>
</div>

<div class="nav-bar">
    <a href="#" class="nav-item" onclick="showSection('home')"><i class="fa-solid fa-house"></i>Home</a>
    <a href="#" class="nav-item" onclick="showSection('task')"><i class="fa-solid fa-list-check"></i>Task</a>
    <a href="#" class="nav-item" onclick="showSection('refer')"><i class="fa-solid fa-users"></i>Refer</a>
    <a href="#" class="nav-item" onclick="showSection('wallet')"><i class="fa-solid fa-wallet"></i>Wallet</a>
    <a href="#" class="nav-item" onclick="showSection('profile')"><i class="fa-solid fa-user"></i>Profile</a>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let balance = 0.00;
    let incomeData = [0.1, 0.2, 0.15, 0.3, 0.05, 0.1, 0.0]; // ডামি ৭ দিনের ডাটা

    function showSection(section) {
        document.querySelectorAll('.container').forEach(s => s.style.display = 'none');
        document.getElementById(section + '-section').style.display = 'block';
    }

    function completeTask(type, reward, link) {
        window.open(link, '_blank');
        setTimeout(() => {
            balance += reward;
            updateUI();
            tg.showAlert(`টাস্ক সফল! আপনি $${reward} পেয়েছেন।`);
        }, 2000);
    }

    function processWithdraw() {
        const amount = parseFloat(document.getElementById('withdraw-amount').value);
        if (amount < 0.50) {
            tg.showAlert("পর্যাপ্ত ব্যালেন্স নেই! সর্বনিম্ন উইথড্র $০.৫০");
            return;
        }
        if (amount > balance) {
            tg.showAlert("আপনার ব্যালেন্স কম আছে।");
            return;
        }
        balance -= amount;
        updateUI();
        tg.showAlert("আপনার উইথড্র সফল হয়েছে! এডমিন চেক করে পেমেন্ট করে দিবে।");
    }

    function updateUI() {
        document.getElementById('balance-display').textContent = `$${balance.toFixed(3)}`;
    }

    // Chart.js for 7 Days Status
    const ctx = document.getElementById('incomeChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5', 'Day 6', 'Today'],
            datasets: [{
                label: 'Daily Income ($)',
                data: incomeData,
                backgroundColor: '#007AFF',
                borderRadius: 5
            }]
        }
    });

    // Monetag Ad Setup (15 sec)
    function showMonetagAd() {
        // এখানে আপনার Monetag ট্যাগ বসাবেন
        console.log("Loading 15s Monetag Telegram Ad...");
    }

    tg.ready();
    updateUI();
</script>
</body>
</html>
