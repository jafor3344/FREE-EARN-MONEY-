<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AdCash Pro</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary-color: #007AFF; --card-bg: #FFFFFF; }
        body { font-family: sans-serif; background: #F0F2F5; margin: 0; padding-bottom: 80px; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .balance-card { background: linear-gradient(135deg, #007AFF, #0056B3); color: white; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .balance-amount { font-size: 38px; font-weight: 800; margin: 5px 0; }
        .income-stats-box { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .chart-container { height: 180px; width: 100%; }
        .btn-action { background: var(--primary-color); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { border: none; background: none; color: #888; font-size: 11px; display: flex; flex-direction: column; align-items: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 24px; box-sizing: border-box; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .ad-info { font-size: 14px; color: #666; margin-bottom: 10px; display: block; text-align: center; }
        
        /* Bonus specific button */
        .btn-bonus { background: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="balance-card">
        <small>Available Balance</small>
        <div class="balance-amount" id="totalEarning">$0.000</div>
    </div>

    <div class="income-stats-box">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
            <b>Income Stats (7D)</b>
            <i class="fa-solid fa-chart-line" style="color:var(--primary-color)"></i>
        </div>
        <div class="chart-container">
            <canvas id="incomeChart"></canvas>
        </div>
    </div>

    <span class="ad-info">Daily Ads: <span id="dailyCount">0</span>/50</span>
    <button class="btn-action" onclick="watchAd()"><i class="fa-solid fa-play-circle"></i> Watch 15s Ad</button>
</div>

<nav class="nav-bar">
    <button class="nav-item" onclick="openModal('withdrawModal')"><i class="fa-solid fa-wallet"></i>Withdraw</button>
    <button class="nav-item" onclick="alert('No history found!')"><i class="fa-solid fa-history"></i>History</button>
    <button class="nav-item" onclick="copyRef()"><i class="fa-solid fa-user-plus"></i>Invite</button>
    <button class="nav-item" onclick="openModal('bonusModal')"><i class="fa-solid fa-gift"></i>Bonus</button>
    <button class="nav-item" onclick="tg.openTelegramLink('https://t.me/trustedbdincome1')"><i class="fa-solid fa-headset"></i>Support</button>
</nav>

<div id="withdrawModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0">Withdraw</h3>
        <p style="font-size:13px; color:#666">Minimum $0.50 Required</p>
        <select id="method">
            <option value="Binance UID">Binance UID</option>
            <option value="Bkash">Bkash</option>
            <option value="Nagad">Nagad</option>
        </select>
        <input type="text" id="wallet" placeholder="Wallet Number / Binance UID">
        <input type="number" id="amount" step="0.01" placeholder="Amount (min 0.50)">
        <button class="btn-action" onclick="handleWithdraw()">Submit Request</button>
        <button onclick="closeModal('withdrawModal')" style="width:100%; border:none; background:none; color:red; margin-top:10px">Cancel</button>
    </div>
</div>

<div id="bonusModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0">Daily Bonus</h3>
        <p style="font-size:13px; color:#666">চ্যানেল ও গ্রুপে জয়েন করে বোনাস নিন</p>
        
        <div style="margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <button class="btn-bonus" onclick="tg.openTelegramLink('https://t.me/trustedbdincome1')">Join Channel ($0.03)</button>
            <button class="btn-action" style="background:#007AFF; margin-top:5px; height: 35px; font-size:12px" onclick="claimBonus('channel')">Check Channel Join</button>
        </div>

        <div>
            <button class="btn-bonus" style="background:#17a2b8" onclick="tg.openTelegramLink('https://t.me/trustedbdincome1')">Join Group ($0.02)</button>
            <button class="btn-action" style="background:#007AFF; margin-top:5px; height: 35px; font-size:12px" onclick="claimBonus('group')">Check Group Join</button>
        </div>
        
        <button onclick="closeModal('bonusModal')" style="width:100%; border:none; background:none; color:red; margin-top:15px">Close</button>
    </div>
</div>

<script>
    const config = {
        token: '8672799678:AAHcyb7TVwRWKEWi-Ej2nm11Z5zg-NJDkJw',
        admin: '6717490662',
        fb: { databaseURL: "https://fir-90b18-default-rtdb.firebaseio.com" }
    };

    firebase.initializeApp(config.fb);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id || "Dev_User";

    let state = { totalEarning: 0, weekly: [0,0,0,0,0,0,0], dailyAds: 0, lastAdDate: "", bonusClaimed: { channel: false, group: false, date: "" } };

    function init() {
        db.ref('users/' + uid).on('value', (snap) => {
            if(snap.exists()) {
                state = snap.val();
                checkDayReset();
                renderUI();
            } else {
                db.ref('users/' + uid).set(state);
            }
        });
    }

    function checkDayReset() {
        const today = new Date().toLocaleDateString();
        if (state.lastAdDate !== today) {
            state.dailyAds = 0;
            state.lastAdDate = today;
            // বোনাস প্রতিদিন একবার নেওয়ার জন্য রিসেট
            if(state.bonusClaimed && state.bonusClaimed.date !== today) {
                state.bonusClaimed = { channel: false, group: false, date: today };
            }
            db.ref('users/' + uid).update(state);
        }
    }

    function renderUI() {
        document.getElementById('totalEarning').innerText = `$${(state.totalEarning || 0).toFixed(3)}`;
        document.getElementById('dailyCount').innerText = state.dailyAds || 0;
        renderChart();
    }

    async function watchAd() {
        if ((state.dailyAds || 0) >= 50) return alert("Daily limit reached!");
        if (typeof show_10904278 === 'function') {
            show_10904278().then(() => addReward(0.003));
        } else {
            addReward(0.003);
            alert("Ad Success!");
        }
    }

    function addReward(amt) {
        state.totalEarning = (state.totalEarning || 0) + amt;
        state.dailyAds = (state.dailyAds || 0) + 1;
        const day = new Date().getDay();
        if(!state.weekly) state.weekly = [0,0,0,0,0,0,0];
        state.weekly[day] += amt;
        db.ref('users/' + uid).update(state);
    }

    function claimBonus(type) {
        const today = new Date().toLocaleDateString();
        if(!state.bonusClaimed) state.bonusClaimed = { channel: false, group: false, date: today };

        if (state.bonusClaimed[type]) {
            alert("আপনি আজ এই বোনাসটি ইতিমধ্যে নিয়েছেন!");
            return;
        }

        const reward = (type === 'channel') ? 0.03 : 0.02;
        state.totalEarning += reward;
        state.bonusClaimed[type] = true;
        state.bonusClaimed.date = today;
        
        db.ref('users/' + uid).update(state);
        alert(`অভিনন্দন! জয়েন করার জন্য $${reward} যোগ করা হয়েছে।`);
    }

    function handleWithdraw() {
        const amt = parseFloat(document.getElementById('amount').value);
        if(amt < 0.50 || amt > state.totalEarning) return alert("ভুল অ্যামাউন্ট অথবা ব্যালেন্স নেই!");
        state.totalEarning -= amt;
        db.ref('users/' + uid).update(state);
        alert("Withdraw Successful!");
        closeModal('withdrawModal');
    }

    let myChart;
    function renderChart() {
        const ctx = document.getElementById('incomeChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['S', 'M', 'T', 'W', 'T', 'F', 'S'],
                datasets: [{ data: state.weekly || [0,0,0,0,0,0,0], backgroundColor: '#5E5CE6', borderRadius: 6 }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function copyRef() {
        const link = `https://t.me/trustedincome26bot?start=${uid}`;
        navigator.clipboard.writeText(link).then(() => alert("Referral link copied!"));
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    window.onload = init;
</script>

<script src="https://alwingulla.com/88/tag.min.js" data-zone="10904278" async data-cfasync="false"></script>
</body>
</html>
