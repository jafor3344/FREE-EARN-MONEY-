<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AdCash Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
:root { --primary-color: #007AFF; --card-bg: #FFFFFF; }
body { font-family: sans-serif; background: #F0F2F5; margin: 0; padding-bottom: 80px; }
.container { max-width: 500px; margin: 0 auto; padding: 15px; }

.balance-card { background: linear-gradient(135deg, #007AFF, #0056B3); color: white; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
.balance-amount { font-size: 38px; font-weight: 800; }

.stats { display:flex; justify-content:space-between; margin-bottom:15px; }
.stat-box { background:#fff; padding:15px; border-radius:15px; width:32%; text-align:center; }

.income-stats-box { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
.chart-container { height: 180px; }

.btn-action { background: var(--primary-color); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; }

.nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
.nav-item { border: none; background: none; color: #888; font-size: 11px; display: flex; flex-direction: column; align-items: center; }
</style>
</head>

<body>

<div class="container">

<div class="balance-card">
<small>YOUR BALANCE</small>
<div class="balance-amount" id="totalEarning">$0.000</div>
</div>

<div class="stats">
<div class="stat-box">
<div id="adsCount">0</div>
<small>Ads</small>
</div>

<div class="stat-box">
<div id="todayAds">0/50</div>
<small>Today</small>
</div>

<div class="stat-box">
<div id="refs">0</div>
<small>Refs</small>
</div>
</div>

<div class="income-stats-box">
<b>Income Stats (7D)</b>
<div class="chart-container">
<canvas id="incomeChart"></canvas>
</div>
</div>

<button class="btn-action" onclick="watchAd()">▶ Watch Ad</button>

</div>

<script>

// Firebase
firebase.initializeApp({
apiKey: "AIzaSyAW7q7L9xKvLP36bB7oYHqZy5Ou-7q0S68",
authDomain: "fir-90b18.firebaseapp.com",
databaseURL: "https://fir-90b18-default-rtdb.firebaseio.com",
projectId: "fir-90b18"
});

const db = firebase.database();
const tg = window.Telegram.WebApp;
const uid = tg.initDataUnsafe?.user?.id || "dev_user";

// STATE
let state = {
totalEarning: 0,
weekly: [0,0,0,0,0,0,0],
adsWatched: 0,
todayAds: 0,
referrals: 0
};

// INIT
function init(){
db.ref('users/'+uid).on('value', snap=>{
if(snap.exists()){
state = snap.val();
if(!state.weekly) state.weekly=[0,0,0,0,0,0,0];
} else {
db.ref('users/'+uid).set(state);
}
renderUI();
});
renderChart();
}

// UI
function renderUI(){
document.getElementById('totalEarning').innerText = "$"+state.totalEarning.toFixed(3);
document.getElementById('adsCount').innerText = state.adsWatched || 0;
document.getElementById('todayAds').innerText = (state.todayAds||0)+"/50";
document.getElementById('refs').innerText = state.referrals || 0;
renderChart();
}

// WATCH AD (15 sec)
async function watchAd(){
if(typeof show_10904278 === 'function'){
try{
await show_10904278();

// 15 sec wait
setTimeout(()=>{
state.totalEarning += 0.003;
state.adsWatched++;
state.todayAds++;

let day = new Date().getDay();
state.weekly[day] += 0.003;

db.ref('users/'+uid).update(state);

alert("Ad watched! +$0.003");

},15000);

}catch(e){
alert("Ad failed!");
}
}else{
alert("Ad loading... wait");
}
}

// CHART
let chart;
function renderChart(){
let ctx = document.getElementById('incomeChart').getContext('2d');
if(chart) chart.destroy();

chart = new Chart(ctx,{
type:'bar',
data:{
labels:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
datasets:[{
data: state.weekly,
backgroundColor:'#007AFF'
}]
},
options:{plugins:{legend:{display:false}}}
});
}

window.onload = init;

</script>

<!-- MONETAG -->
<script src="https://alwingulla.com/88/tag.min.js"
data-zone="10904278"
async
data-cfasync="false"></script>

</body>
</html>
