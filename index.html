<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AdCash Pro - Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary: #007AFF; --bg: #F2F4F7; --card: #FFFFFF; --text: #1C1C1E; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: var(--text); }
        
        .profile-header { display: flex; align-items: center; gap: 15px; padding: 20px; background: var(--card); margin-bottom: 1px; border-radius: 0 0 20px 20px; }
        .user-pic { width: 50px; height: 50px; border-radius: 50%; background: #ddd; object-fit: cover; border: 2px solid var(--primary); display: block; }
        .user-info-text { display: flex; flex-direction: column; }
        .user-name { font-weight: 800; font-size: 18px; color: var(--text); }
        .user-status { font-size: 12px; color: #4CAF50; font-weight: bold; }

        .header-balance { background: var(--primary); color: white; padding: 25px 20px; border-radius: 20px; text-align: center; margin: 15px; }
        .balance-title { font-size: 13px; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }
        .balance-val { font-size: 38px; font-weight: 800; margin: 5px 0; }
        
        .container { padding: 0 15px; }
        .card { background: var(--card); padding: 18px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8f9fa; border-radius: 12px; margin-bottom: 10px; border: 1px solid #eee; }
        .btn-check { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        .withdraw-input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 15px; font-size: 16px; font-weight: 700; cursor: pointer; }

        #ad-loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { color: #8E8E93; text-decoration: none; font-size: 11px; text-align: center; flex: 1; border: none; background: none; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="ad-loader">
    <div class="spinner"></div>
    <div id="ad-timer">Loading Advertisement...</div>
</div>

<div id="section-home">
    <div class="profile-header">
        <img id="u-pic" class="user-pic" src="https://ui-avatars.com/api/?name=User&background=007AFF&color=fff" alt="User">
        <div class="user-info-text">
            <span class="user-name" id="u-name">Loading...</span>
            <span class="user-status">● Active Member</span>
        </div>
    </div>

    <div class="header-balance">
        <div class="balance-title">Main Balance</div>
        <div class="balance-val" id="bal">$0.000</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-chart-line"></i> Income Status</div>
            <div style="height: 180px; width: 100%;">
                <canvas id="incomeChart"></canvas>
            </div>
        </div>
        <button class="btn-main" onclick="showSection('task')"><i class="fa-solid fa-circle-play"></i> START EARNING</button>
    </div>
</div>

<div id="section-task" style="display:none;" class="container">
    <br>
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-check-double"></i> Social Tasks</div>
        <div class="task-item">
            <div><b>Join Channel</b><br><small>Get Updates</small></div>
            <button class="btn-check" onclick="tg.openTelegramLink('https://t.me/trustedbdincome1')">Join</button>
        </div>
        <div class="task-item">
            <div><b>Join Group</b><br><small>Support Group</small></div>
            <button class="btn-check" onclick="tg.openTelegramLink('https://t.me/+Yzmy6WpJSWVmOWI1')">Join</button>
        </div>
    </div>
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-play"></i> Video Task</div>
        <button class="btn-main" onclick="watchAd()">Watch Video Ad ($0.003)</button>
    </div>
</div>

<div id="section-wallet" style="display:none;" class="container">
    <br>
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-money-bill-wave"></i> Cash Out</div>
        <p style="font-size: 13px;">Minimum: <b>$0.50</b></p>
        <select class="withdraw-input" id="method">
            <option value="Binance UID">Binance UID</option>
            <option value="bKash">bKash</option>
            <option value="Nagad">Nagad</option>
        </select>
        <input type="text" class="withdraw-input" id="wallet-addr" placeholder="Enter Wallet Info">
        <input type="number" class="withdraw-input" id="amount" placeholder="Amount (e.g. 0.50)">
        <button class="btn-main" onclick="handleWithdraw()">Withdraw Now</button>
    </div>
</div>

<div id="section-refer" style="display:none;" class="container">
    <br>
    <div class="card" style="text-align: center;">
        <div class="card-title">Referral Program</div>
        <p>Invite friends and get $0.01 bonus!</p>
        <div id="ref-count-display" style="font-size: 30px; font-weight: bold; color: var(--primary);">0</div>
        <small>Total Successful Invites</small>
        <button class="btn-main" style="margin-top:20px;" onclick="copyRef()">Copy Link</button>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="showSection('home', this)"><i class="fa-solid fa-house"></i>Home</button>
    <button class="nav-item" onclick="showSection('task', this)"><i class="fa-solid fa-list-check"></i>Task</button>
    <button class="nav-item" onclick="showSection('refer', this)"><i class="fa-solid fa-users"></i>Refer</button>
    <button class="nav-item" onclick="showSection('wallet', this)"><i class="fa-solid fa-wallet"></i>Wallet</button>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAW7q7L9xKvLP36bB7oYHqZy5Ou-7q0S68",
        authDomain: "fir-90b18.firebaseapp.com",
        databaseURL: "https://fir-90b18-default-rtdb.firebaseio.com",
        projectId: "fir-90b18",
        storageBucket: "fir-90b18.firebasestorage.app",
        messagingSenderId: "503462119250",
        appId: "1:503462119250:web:42a45758449b5188835c8b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    const user = tg.initDataUnsafe?.user;
    const uid = user?.id || "Dev_User";

    let state = { totalEarning: 0, referrals: 0, weekly: [0.01, 0.05, 0.02, 0.08, 0.03, 0.04, 0.01], tasks: {} };
    let incomeChart = null;

    function init() {
        const name = user ? (user.first_name + (user.last_name ? ' ' + user.last_name : '')) : "Guest User";
        document.getElementById('u-name').innerText = name;
        
        if(user && user.photo_url) {
            document.getElementById('u-pic').src = user.photo_url;
        } else {
            document.getElementById('u-pic').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=007AFF&color=fff`;
        }

        db.ref('users/' + uid).on('value', (snap) => {
            const data = snap.val();
            if(data) {
                state = { ...state, ...data };
                document.getElementById('bal').innerText = `$${(state.totalEarning || 0).toFixed(3)}`;
                document.getElementById('ref-count-display').innerText = state.referrals || 0;
                renderChart();
            } else {
                renderChart();
            }
        });
    }

    function watchAd() {
        const adLink = "https://omg10.com/4/10924120";
        tg.openLink(adLink);

        const loader = document.getElementById('ad-loader');
        const timer = document.getElementById('ad-timer');
        loader.style.display = 'flex';
        let timeLeft = 15;
        const countdown = setInterval(() => {
            timeLeft--;
            timer.innerText = `Watching Ad: ${timeLeft}s remaining...`;
            if(timeLeft <= 0) {
                clearInterval(countdown);
                loader.style.display = 'none';
                state.totalEarning += 0.003;
                db.ref('users/' + uid).update({ totalEarning: state.totalEarning });
                tg.showAlert("Success! You earned $0.003");
            }
        }, 1000);
    }

    function showSection(id, el) {
        ['home', 'task', 'refer', 'wallet'].forEach(s => document.getElementById('section-' + s).style.display = 'none');
        document.getElementById('section-' + id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
        if(id === 'home') setTimeout(renderChart, 100);
    }

    function handleWithdraw() {
        const amt = parseFloat(document.getElementById('amount').value);
        if(amt < 0.50 || isNaN(amt)) return tg.showAlert("ভুল অ্যামাউন্ট! সর্বনিম্ন $0.50");
        if(amt > state.totalEarning) return tg.showAlert("Insufficient balance!");
        state.totalEarning -= amt;
        db.ref('users/' + uid).update({ totalEarning: state.totalEarning });
        tg.showAlert("আপনার উইথড্র আবেদন গ্রহণ করা হয়েছে!");
    }

    // doTask ফাংশনটি এখন আর সোশ্যাল টাস্কের জন্য ব্যবহার হচ্ছে না, তাই এটি শুধু রেখে দেওয়া হলো কিন্তু বোনাস লজিক নেই।
    
    function renderChart() {
        const ctx = document.getElementById('incomeChart').getContext('2d');
        if(incomeChart) incomeChart.destroy();
        
        incomeChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['S', 'M', 'T', 'W', 'T', 'F', 'S'],
                datasets: [{
                    label: 'Income',
                    data: state.weekly,
                    backgroundColor: '#007AFF',
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: true, grid: { display: false }, ticks: { display: false } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    function copyRef() {
        const link = `https://t.me/trustedincome26bot?start=${uid}`;
        navigator.clipboard.writeText(link).then(() => tg.showAlert("Ref Link Copied!"));
    }

    tg.ready();
    tg.expand();
    window.onload = init;
</script>
</body>
</html>
