<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style>
        /* আপনার আগের সব CSS এখানে থাকবে */
        .stats-container {
            background: var(--card-background);
            margin: 15px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        canvas#incomeChart {
            width: 100% !important;
            height: 200px !important;
        }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="chart-header">
            <h3 style="margin:0; font-size:18px;">Income Stats (7D)</h3>
            <i class="fa-solid fa-chart-line" style="color:var(--primary-color)"></i>
        </div>
        <canvas id="incomeChart"></canvas> </div>

    <div class="container">
        <button class="btn-action" onclick="watchAd()"><i class="fa-solid fa-play"></i> Watch Ad</button>
        <button class="btn-action" onclick="claimBonus('c')"><i class="fa-brands fa-telegram"></i> Join Channel ($0.03)</button>
        <button class="btn-action" onclick="claimBonus('g')"><i class="fa-solid fa-users"></i> Join Group ($0.03)</button>
    </div>

    <script>
        // আপনার আগের Firebase কনফিগারেশন এবং ভ্যারিয়েবল
        // ... 

        // ১. অ্যাড ক্লিক কাজ না করার সমাধান
        async function watchAd() {
            const adBtn = document.querySelector('.btn-action');
            adBtn.disabled = true; // ডাবল ক্লিক আটকাতে

            try {
                // Monetag লোড হচ্ছে কি না চেক করা
                if (typeof show_10904278 === 'function') {
                    await show_10904278(); 
                    processReward();
                } else {
                    // যদি Monetag কাজ না করে তবে সরাসরি রিওয়ার্ড (টেস্টিং এর জন্য)
                    console.log("Monetag script missing, giving fallback reward");
                    processReward();
                }
            } catch (err) {
                alert("Ad failed to load. Please try again.");
            } finally {
                adBtn.disabled = false;
            }
        }

        function processReward() {
            state.totalEarning += 0.003;
            state.adCount++;
            state.dailyAds++;
            
            // আজকের আয়ের ডাটা গ্রাফের জন্য আপডেট করা
            updateWeeklyStats(0.003); 
            
            db.ref('users/' + uid).update(state);
            alert("সফল! আপনার ব্যালেন্সে $0.003 যোগ হয়েছে।");
            render();
            renderChart(); // গ্রাফ রিফ্রেশ করা
        }

        // ২. Income Stats (7D) গ্রাফ লজিক
        function renderChart() {
            const ctx = document.getElementById('incomeChart').getContext('2d');
            const weeklyData = state.weeklyIncome || [0, 0, 0, 0, 0, 0, 0]; // গত ৭ দিনের ডাটা
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
                    datasets: [{
                        label: 'Income',
                        data: weeklyData,
                        backgroundColor: '#5E5CE6',
                        borderRadius: 8,
                        barThickness: 20
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { display: false } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // সপ্তাহের আয়ের ডাটাবেস হ্যান্ডলিং
        function updateWeeklyStats(amount) {
            const dayIndex = new Date().getDay(); // আজকের দিন (০-৬)
            if(!state.weeklyIncome) state.weeklyIncome = [0,0,0,0,0,0,0];
            state.weeklyIncome[dayIndex] += amount;
        }

        // উইন্ডো লোড হওয়ার সময় চার্ট দেখানো
        window.onload = () => {
            init(); 
            setTimeout(renderChart, 2000); // ডাটা লোড হওয়ার পর চার্ট আঁকা
        };
    </script>

    <script src="https://alwingulla.com/88/tag.min.js" data-zone="10904278" async data-cfasync="false"></script>
</body>
</html>
