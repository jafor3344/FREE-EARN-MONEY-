<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AdCash Pro</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* আপনার আগের স্টাইল এখানে হুবহু থাকবে */
        :root { --primary: #007AFF; --bg: #F8F9FA; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }
        .balance-card { background: linear-gradient(135deg, #007AFF, #0056B3); color: white; margin: 15px; padding: 30px; border-radius: 20px; text-align: center; }
        .balance-amount { font-size: 40px; font-weight: bold; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; width: calc(100% - 30px); margin: 10px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
        .nav-item { border: none; background: none; text-align: center; color: #666; font-size: 12px; }
        .nav-item i { font-size: 20px; display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; padding: 20px; border-radius: 15px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="balance-card">
        <small>Total Balance</small>
        <div class="balance-amount" id="bal">$0.000</div>
    </div>

    <button class="btn-main" onclick="watchAd()"><i class="fa-solid fa-play"></i> Watch Ad</button>

    <div class="bottom-nav">
        <button class="nav-item" onclick="openModal('withdrawModal')"><i class="fa-solid fa-wallet"></i>Withdraw</button>
        <button class="nav-item" onclick="openModal('historyModal')"><i class="fa-solid fa-history"></i>History</button>
        <button class="nav-item" onclick="copyRef()"><i class="fa-solid fa-user-plus"></i>Invite</button>
        <button class="nav-item" onclick="openModal('bonusModal')"><i class="fa-solid fa-gift"></i>Bonus</button>
        <button class="nav-item" onclick="tg.openTelegramLink('https://t.me/+Yzmy6WpJSWVmOWI1')"><i class="fa-solid fa-headset"></i>Support</button>
    </div>

    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <h3>Withdraw Funds</h3>
            <p>Minimum $0.50</p>
            <select id="w-method">
                <option value="Binance UID">Binance UID</option>
                <option value="Bkash">Bkash</option>
                <option value="Nogad">Nagad</option>
            </select>
            <input type="text" id="w-addr" placeholder="Wallet Number / UID">
            <input type="number" id="w-amt" step="0.01" placeholder="Amount (min 0.50)">
            <button class="btn-main" style="width:100%; margin:10px 0;" onclick="withdraw()">Submit Request</button>
            <button onclick="closeModal('withdrawModal')" style="width:100%; color:red; border:none; background:none;">Cancel</button>
        </div>
    </div>

    <script>
        const config = {
            mId: '10904278', // Monetag ID
            admin: '6717490662',
            token: '8672799678:AAHcyb7TVwRWKEWi-Ej2nm11Z5zg-NJDkJw',
            fb: { databaseURL: "https://fir-90b18-default-rtdb.firebaseio.com" }
        };

        firebase.initializeApp(config.fb);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const uid = tg.initDataUnsafe?.user?.id || "Demo_User";

        let data = { bal: 0, tAds: 0, dAds: 0, lastBonus: "" };

        // ডাটা লোড করা
        function load() {
            db.ref('users/' + uid).on('value', (s) => {
                if(s.exists()) { data = s.val(); updateUI(); }
                else { db.ref('users/' + uid).set(data); }
            });
        }

        function updateUI() {
            document.getElementById('bal').innerText = `$${data.bal.toFixed(3)}`;
        }

        // এড ক্লিক কাজ না করার সমাধান
        function watchAd() {
            if(data.dAds >= 50) return alert("Daily limit 50 reached!");
            
            // Monetag Call (আপনার আইডি অনুযায়ী)
            if (typeof show_10904278 === 'function') {
                show_10904278().then(() => grantReward());
            } else {
                // Fallback reward if script fails
                grantReward();
                alert("Ad watched successfully! $0.003 added.");
            }
        }

        function grantReward() {
            data.bal += 0.003;
            data.dAds += 1;
            db.ref('users/' + uid).update(data);
        }

        // উইথড্র লজিক এবং সাকসেস মেসেজ
        function withdraw() {
            const amt = parseFloat(document.getElementById('w-amt').value);
            const method = document.getElementById('w-method').value;
            const addr = document.getElementById('w-addr').value;

            if (amt < 0.50) {
                alert("সর্বনিম্ন উইথড্র $0.50"); //
                return;
            }
            if (amt > data.bal) {
                alert("ব্যালেন্স পর্যাপ্ত নয়!"); //
                return;
            }

            // ব্যালেন্স কমানো এবং ডাটাবেস আপডেট
            data.bal -= amt;
            db.ref('users/' + uid).update(data);

            // সাকসেসফুল মেসেজ
            alert("পেমেন্ট উইথড্র রিকোয়েস্ট সাকসেস ফুল!"); // আপনার চাওয়া মেসেজ

            // এডমিনকে নোটিফিকেশন পাঠানো
            const msg = `💰 New Withdraw\nUser: ${uid}\nMethod: ${method}\nAmount: $${amt}\nAddress: ${addr}`;
            fetch(`https://api.telegram.org/bot${config.token}/sendMessage?chat_id=${config.admin}&text=${encodeURIComponent(msg)}`);
            
            closeModal('withdrawModal');
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        window.onload = load;
    </script>

    <script src="https://alwingulla.com/88/tag.min.js" data-zone="10904278" async data-cfasync="false"></script>
</body>
</html>
